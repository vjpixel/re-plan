name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (Node JS files)
        run: |
          node --check upload-sprint.js
          node --check find-script-id.js
          node --check test-script.js
          node --check parser.js
          node --check build.js

      - name: Verify insert-sprint.gs is in sync with parser.js
        run: npm run check-sync

      - name: Run tests
        run: npm test
